name: Deploy Echo Frontend (Preview)

on:
  pull_request:
    paths:
      - 'ci/axis-version'
      - 'ci/deploy-echo-frontend.sh'
  workflow_dispatch:
    inputs:
      axis_ref:
        description: 'AXIS commit SHA to deploy (preview only)'
        required: false
        default: ''

permissions:
  pull-requests: write

concurrency:
  group: deploy-echo-frontend-preview-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false
    steps:
      - name: Checkout echo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Deploy to Vercel (preview)
        id: deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          EXTRA_ARGS=""
          AXIS_REF="${{ github.event.inputs.axis_ref }}"
          if [[ -n "$AXIS_REF" ]]; then
            EXTRA_ARGS="--axis-ref $AXIS_REF"
          fi
          bash ci/deploy-echo-frontend.sh --vercel-env preview $EXTRA_ARGS 2>&1 | tee deploy-output.txt
          DEPLOY_URL=$(grep "^URL:" deploy-output.txt | awk '{print $2}')
          echo "deploy_url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"

      - name: Comment preview URL on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const deployUrl = '${{ steps.deploy.outputs.deploy_url }}';
            const axisSha = require('fs').readFileSync('ci/axis-version', 'utf8').trim();
            const marker = '<!-- echo-frontend-preview -->';
            const body = `${marker}\n**Echo Frontend Preview**\n${deployUrl}\nAXIS SHA: \`${axisSha}\``;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
