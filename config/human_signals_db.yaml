human_signals_db:
  enabled: true
  auto_load: true

  # Database connection — password injected at runtime via HUMAN_SIGNALS_DB_PASSWORD env var
  host: host.docker.internal
  port: 5432
  database: eval
  username: mattevanoff
  password: null
  ssl_mode: disable

  dataset_query: |
    SELECT
      *
    FROM evaluation_dataset c
    WHERE source_type = 'slack'

  results_query: |
    SELECT
      *
    FROM evaluation_results r
    WHERE eval_mode = 'online'

  visible_kpis:
   - is_escalated
   - has_actionable_feedback
   - has_intervention
   - is_overridden
   - total_cases