monitoring_db:
  # Database connection — password injected at runtime via MONITORING_DB_PASSWORD env var
  host: ep-damp-fog-ahx4fv12-pooler.c-3.us-east-1.aws.neon.tech
  port: 5432
  database: neondb
  username: neondb_owner
  password: null
  ssl_mode: require
  enabled: true
  auto_load: true
  dataset_query: |
      SELECT *, created_at AS sync_watermark 
      FROM evaluation_dataset
      WHERE source_type = 'langfuse' 
  results_query: |
      SELECT *, "timestamp" AS sync_watermark 
      FROM evaluation_results 
      WHERE eval_mode = 'online'
  query_timeout: 120
  row_limit: 10000

  # Periodic incremental sync: pull new rows every 15 minutes
  refresh_interval_minutes: 15
  incremental_column: "sync_watermark"


  anomaly_detection:
      enabled: true
      min_data_points: 3

      z_score:
        enabled: true
        threshold: 1.0        # Very sensitive — will fire on mild variation
        severity: "warning"
        lookback_window: 0    # Use all available data
        metrics: ['UW Faithfulness']