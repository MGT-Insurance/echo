# =====================================================
# AXIS Theme Configuration
# Professional Design System
# =====================================================
#
# Copy this file to theme.yaml and customize as needed.
# Environment variables (AXIS_THEME_*) take precedence over YAML values.
#
# Usage:
#   Option 1: cp theme.yaml.example theme.yaml && edit theme.yaml
#   Option 2: export AXIS_THEME_ACTIVE=professional_blue
#   Option 3: export AXIS_THEME_PRIMARY="#3D5A80"
#
# Environment Variables:
#   AXIS_THEME_ACTIVE        - Active palette name (e.g., "professional_blue")
#   AXIS_THEME_PRIMARY       - Override primary color
#   AXIS_THEME_PRIMARY_LIGHT - Override primary light color
#   AXIS_THEME_PRIMARY_DARK  - Override primary dark color
#   AXIS_THEME_PRIMARY_SOFT  - Override primary soft color
#   AXIS_THEME_PRIMARY_PALE  - Override primary pale color
#   AXIS_THEME_ACCENT_GOLD   - Override accent gold color
#   AXIS_THEME_ACCENT_SILVER - Override accent silver color
#   AXIS_THEME_HERO_IMAGE    - URL/path to hero background image
#   AXIS_THEME_LOGO_URL      - URL/path to logo image
#   AXIS_THEME_FAVICON_URL   - URL/path to favicon (browser tab icon)
#   AXIS_THEME_APP_ICON_URL  - URL/path to app icon (sidebar logo)
#   AXIS_THEME_HERO_CONTRAST   - Hero image contrast filter (1.0 = normal)
#   AXIS_THEME_HERO_SATURATION - Hero image saturation filter (1.0 = normal)
#   AXIS_THEME_HERO_BRIGHTNESS - Hero image brightness filter (1.0 = normal)
#   AXIS_THEME_HERO_OPACITY    - Hero image opacity (1.0 = fully visible)
#   AXIS_THEME_HERO_MODE       - Hero section mode: 'dark' (default) or 'light'

theme:
  # Active palette name - must match a key in 'palettes' below
  active: "professional_blue"

  # Branding — customize text shown throughout the app
  branding:
   app_name: " Echo"
   tagline: "Listen. Learn. Improve."
   subtitle: "MGT Observability & Evaluation Studio"
   description: |-
    Echo is MGT's friendly signal tracker
    monitoring performance, surfacing insights,
    and powering continuous learning.
   report_footer: "Report generated by Echo — MGT’s signal intelligence system"
   footer_name: "MGT Insurance"
