kpi_db:
    enabled: true
    auto_load: true

    # Database connection — password injected at runtime via KPI_DB_PASSWORD env var
    host: host.docker.internal
    port: 5432
    database: eval
    username: mattevanoff
    password: null
    ssl_mode: disable

    # This query pulls the last 90 days of numeric KPIs
    query: |
      SELECT id, created_at, source_name, source_type, kpi_name, kpi_category,
             dataset_id, numeric_value, source_component, source_step,
             environment, segment, tags, metadata
      FROM agent_kpi_logs
      WHERE created_at > NOW() - INTERVAL '90 days'
        AND numeric_value IS NOT NULL
      ORDER BY created_at DESC, id DESC

    query_timeout: 60
    row_limit: 50000

    visible_kpis_per_source:
      athena:
        - stp_rate
        - referral_rate
        - decision_variance
        - referral_accuracy
        - modification_rate
        - decline_rate

    # Category panel definitions (slug must match kpi_category column in data)
    categories:
      operational_efficiency:
        display_name: Operational Efficiency
        icon: Zap
      risk_accuracy:
        display_name: Risk Accuracy
        icon: Shield

    # Per-KPI overrides (unit, display_name, polarity)
    kpi_overrides:
      referral_rate:
        display_name: Referral Rate
        unit: percent
        polarity: lower_better
      stp_rate:
        display_name: STP Rate
        unit: percent
        polarity: higher_better
      time_to_quote:
        display_name: Time To Quote
        unit: seconds
        polarity: lower_better
      decision_variance:
        display_name: Decision Variance
        unit: percent
        polarity: higher_better
      referral_accuracy:
        display_name: Referral Accuracy
        unit: percent
        polarity: higher_better
      modification_rate:
        display_name: Modification Rate
        unit: percent
        polarity: lower_better

    composition_charts:
      - title: "Decision Breakdown"
        kpis:
          - kpi_name: stp_rate
            label: "Approved"
            color: "#4ADE80"
          - kpi_name: modification_rate
            label: "Approved w/ Mods"
            color: "#60A5FA"
          - kpi_name: referral_rate
            label: "Referred"
            color: "#FBBF24"
          - kpi_name: decline_rate
            label: "Declined"
            color: "#F87171"

    # Athena shows 30d avg on cards, only 2 trend lines
    display_per_source:
      athena:
        card_display_value: avg_30d
        trend_lines:
          - avg_30d
          - avg_7d
